name: eval

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: eval-${{ github.ref }}
  cancel-in-progress: true

jobs:
  agent-eval:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
      MODEL_ID: ${{ secrets.MODEL_ID }}
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v5
        with:
          run_install: false
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Deterministic Agent eval
        run: pnpm eval
      - name: Real DeepSeek contract eval
        run: pnpm test:deepseek
      - name: Upload deterministic results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-results
          path: eval/results.jsonl
