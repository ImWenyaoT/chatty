name: CI

on:
  pull_request:
  push:
    branches:
      - main

# 同一分支连推时取消旧 run，省额度也省排队
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # pnpm 版本从 package.json 的 packageManager 字段读取，避免两处漂移
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build package skeleton
        run: pnpm build:skeleton

      - name: Lint and format
        run: pnpm lint

      - name: Smoke test (core data path, no network)
        run: node scripts/smoke.mts

      - name: Test workspaces
        run: pnpm test

      - name: Control-plane integration
        run: pnpm test:control-plane-integration

      - name: Web core coverage
        run: pnpm test:coverage

      - name: Frontend experience contract
        run: pnpm test:frontend

      - name: Typecheck workspaces
        run: pnpm typecheck

      # pnpm -r build 已覆盖全部 workspace 包
      - name: Build workspaces
        run: pnpm build
