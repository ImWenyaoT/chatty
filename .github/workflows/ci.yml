name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build package skeleton
        run: npm run build:skeleton

      - name: Test workspaces
        run: npm test

      - name: Typecheck workspaces
        run: npm run typecheck

      - name: Build workspaces
        run: npm run build

      - name: Build legacy rag-service
        run: npm run build:rag-service

      - name: Install dashboard dependencies
        run: npm --prefix rag-service/dashboard ci

      - name: Build legacy dashboard
        run: npm --prefix rag-service/dashboard run build
