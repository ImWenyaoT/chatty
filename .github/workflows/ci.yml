name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.9.0
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build package skeleton
        run: pnpm build:skeleton

      - name: Smoke test (data path, no network)
        run: node scripts/smoke.mts

      - name: Test workspaces
        run: pnpm test

      - name: Typecheck workspaces
        run: pnpm typecheck

      - name: Build workspaces
        run: pnpm build

      - name: Build legacy rag-service
        run: pnpm build:rag-service

      - name: Build legacy dashboard
        run: pnpm --filter rental-dashboard build
