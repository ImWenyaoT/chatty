name: Release

on:
  push:
    tags:
      - "v*"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  deliver:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build standalone release
        run: pnpm package:release

      - name: Smoke standalone server
        env:
          CHATTY_DB_PATH: ${{ runner.temp }}/chatty-release.sqlite
          HOSTNAME: 127.0.0.1
          PORT: 3100
        run: |
          node release/chatty/apps/web/server.js &
          server_pid=$!
          trap 'kill "$server_pid"' EXIT
          for attempt in $(seq 1 30); do
            curl --fail --silent http://127.0.0.1:3100/api/health && break
            sleep 1
          done
          curl --fail --silent http://127.0.0.1:3100/api/health

      - name: Archive release
        run: tar -czf "chatty-${GITHUB_REF_NAME}.tar.gz" -C release chatty

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" "chatty-${GITHUB_REF_NAME}.tar.gz" --verify-tag --generate-notes
