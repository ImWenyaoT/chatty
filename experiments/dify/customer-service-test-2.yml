    - data:
        code: "def recommend_size(weight: float, height: float) -> str:\n    # 尺码表数据（身高范围、体重范围、推荐尺码）\n\
          \    table = [\n        (150, 155, 0, 45, \"S\"),\n        (150, 155, 45,\
          \ 48.5, \"M\"),\n        (150, 155, 49, 53.5, \"L\"),\n        (150, 155,\
          \ 54, 58.5, \"XL\"),\n        (150, 155, 59, 63, \"2XL\"),\n        (150,\
          \ 155, 63, 68, \"3XL\"),\n        (150, 155, 68.5, 72.5, \"4XL\"),\n   \
          \     (150, 155, 72.5, 77, \"5XL\"),\n        (156, 159, 0, 45, \"S\"),\n\
          \        (156, 159, 45, 49, \"M\"),\n        (156, 159, 49, 54, \"L\"),\n\
          \        (156, 159, 54, 59, \"XL\"),\n        (156, 159, 59, 63.5, \"2XL\"\
          ),\n        (156, 159, 64, 68, \"3XL\"),\n        (156, 159, 68.5, 73, \"\
          4XL\"),\n        (156, 159, 74, 77.5, \"5XL\"),\n        (160, 164, 0, 46,\
          \ \"S\"),\n        (160, 164, 46, 50, \"M\"),\n        (160, 164, 50, 55,\
          \ \"L\"),\n        (160, 164, 55, 60, \"XL\"),\n        (160, 164, 60, 65,\
          \ \"2XL\"),\n        (160, 164, 65, 70, \"3XL\"),\n        (160, 164, 70,\
          \ 75, \"4XL\"),\n        (160, 164, 75, 80, \"5XL\"),\n        (165, 170,\
          \ 0, 46, \"S\"),\n        (165, 170, 46, 51, \"M\"),\n        (165, 170,\
          \ 51, 56, \"L\"),\n        (165, 170, 56, 61, \"XL\"),\n        (165, 170,\
          \ 61, 66, \"2XL\"),\n        (165, 170, 66, 71, \"3XL\"),\n        (165,\
          \ 170, 71, 76, \"4XL\"),\n        (165, 170, 76, 81, \"5XL\"),\n    ]\n\
          \    \n    for h_min, h_max, w_min, w_max, size in table:\n        if h_min\
          \ <= height <= h_max and w_min <= weight <= w_max:\n            return size\n\
          \    \n    return \"尺码未知\"\n\ndef main(arg1: str, arg2: str):\n    try:\n\
          \        weight = float(arg1)  # 体重（kg）\n        height = float(arg2)  #\
          \ 身高（cm）\n        \n        size = recommend_size(weight, height)  # 根据身高和体重推荐尺码\n\
          \        return {\n            \"result\": size  # 返回推荐的尺码\n        }\n\
          \    except ValueError:\n        return {\n            \"result\": \"无效的输入，请输入有效的体重（kg）和身高（cm）。\"\
