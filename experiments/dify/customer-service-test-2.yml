    - data:
        classes:
        - id: '1'
          name: '当前商品相关咨询

            顾客针对当前商品提问，包括：详情、面料、价格、库存、尺码、租期、试穿、押金、邮寄等问题。

            如果顾客说了身高体重或问“穿多大”，也属于这一类。

            举例：

            “这件礼服是缎面吗？”；“这个西装有 M 码吗？”；“我165，120斤，穿多大？”；“这个礼服能租几天？”；“这个西装可以下周租吗？ “什么时间寄到”'
        - id: '2'
          name: '泛问找款 / 推荐需求

            顾客不是在问当前商品，而是表达想找某类服装、相似款或按用途寻找合适款式。

            通常没有明确的商品上下文，或者明确提到“有××吗”“想租××”。

            举例：

            “有学士服吗？”；“我要找白色礼服”；“想租西装去面试”；“有没有可爱的玩偶服装？”；“适合婚礼穿的礼服有哪些？”'
        - id: '1761899868754'
          name: '图片找商品

            顾客发送了一张图片，可能没有文字，也可能附带简短描述（如“像这件”“有没有租的”）。

            机器人需要先识别图片，再判断顾客意图（是想找图中商品还是相似款）。

            举例：

            （仅发图片）；“像这件，有没有租的？”；“这张图这种风格有吗？”；“我想租这种西装。”'
        - id: '1761899874676'
          name: '售后与服务咨询

            顾客咨询售后、退换、清洗、押金、赔付等相关问题。

            通常是已下单或租赁中的用户提出。

            举例：

            “衣服不合适可以换吗？”；“弄脏了怎么办？”；“押金什么时候退？”；“租期到了可以延长吗？”；“你们清洗吗？”'
        - id: '1762136246444'
          name: '其他 / 模糊 / 闲聊

            顾客表达不清、意图不明确或只是随意聊天，需要机器人主动澄清或引导顾客说出目的。

            举例：

            “看看呗~”；“你是谁？”；“有推荐吗？”；“我想租点好看的~”；（没有实际问题或信息不完整）'
