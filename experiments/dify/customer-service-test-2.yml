    - data:
        instruction: '根据{{#sys.query#}}描述获取身高并以cm为单位赋值给身高height，如果没有就null，获取体重并以kg为单位赋值给体重weight，如果没有就null

          根据收到的图片左上角的sku号判断出是否有SKU号，如果没有就赋值null'
        model:
          completion_params:
            temperature: 0.7
          mode: chat
          name: gpt-4o
          provider: langgenius/openai/openai
        parameters:
        - description: 体重，kg
          name: weight
          required: false
          type: number
        - description: 身高，cm
          name: height
          required: false
          type: number
        - description: 衣服的货号，如果是本店的商品图片左上角都会有sku编号
          name: sku
          required: false
          type: string
        - description: 用户计划使用或租赁的日期，没有则留空
          name: rental_date
          required: false
          type: string
        - description: 用户当前主要咨询意图，例如尺码、价格、档期、试穿、售后
          name: intent
          required: false
          type: string
        query:
        - sys
        - query

                  提取规则：

                  1. 身高提取为 height，单位统一为 cm；没有就留空。

                  2. 体重提取为 weight，单位统一为 kg；如果用户说“120斤”要换算为 60kg；没有就留空。

                  3. 如果图片中能识别到本店商品编号，则提取为 sku；没有就留空。

                  4. 如果用户提到了使用日期、租赁日期、哪天穿、哪天要，用原话提取为 rental_date；没有就留空。

                  5. 根据用户问题判断主要意图 intent，只能从以下值中选择一个：商品详情、价格押金、库存档期、尺码推荐、试穿换码、售后服务、找款推荐、其他。

                  6. 不要臆造不存在的信息。'
