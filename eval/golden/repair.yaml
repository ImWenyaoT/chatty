# harness 版（§5.3）。与 legacy 版语义等价性：
# - action repair 无 harness 对应词汇（§5.3 "其余逐场景定夺"）："不推进状态机"在
#   harness 里没有状态机可断言，退而以行为断言表达：致歉/澄清语气（containsAny）
#   + 不催下单（notContains）+ 连续没听懂时换说法（notSameAsPrev）。
name: repair
description: 用户说没听懂时，不推进流程，重新澄清
customerId: golden-repair
productId: SUIT-001
conversationId: golden-repair-v1
steps:
  - user: 我想租黑色西装
  - user: ？
    expect:
      containsAny: ["不好意思", "抱歉", "没说清楚", "不清楚", "没讲清楚"]
      notContains: ["下单"]
  - user: 没听懂
    expect:
      containsAny: ["不好意思", "抱歉", "没说清楚", "不清楚", "没讲清楚"]
      notContains: ["下单"]
      # 连着没听懂，本轮必须换说法，不能和上一轮逐字复读
      notSameAsPrev: true
