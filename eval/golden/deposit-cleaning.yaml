# 检索必答场景（§5.4 之 3）：押金口径（按具体商品和订单规则确认）与清洗政策
# （门店统一处理、无需自行清洗）只存在于 knowledge/history/qa-examples.csv——
# 缺检索必 FAIL；押金不得编造具体金额（notContains 常见整数金额）。
# 不计入 11/11 退役门槛；B5 达标验收要求 PASS。
name: deposit-cleaning
description: 检索必答——问押金与清洗，口径只在知识库语料里且不得编造金额
customerId: golden-deposit-cleaning
conversationId: golden-deposit-cleaning-v1
steps:
  - user: 租衣服需要押金吗？
    expect:
      containsAny: ["具体商品和订单规则", "订单规则确认", "根据具体商品"]
      notContains: ["100", "200", "300", "500"]
  - user: 那衣服穿完还需要我自己洗吗？
    expect:
      containsAny:
        [
          "门店统一处理",
          "无需自行清洗",
          "不需要自己洗",
          "不用自己洗",
          "无需清洗",
        ]
