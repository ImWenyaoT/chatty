# harness 版（§5.3）。与 legacy 版语义等价性：
# - step1 actionIn [greet, small_talk] 无 harness 对应词汇：真实契约是"回应在场"，
#   由 contains ["在"] 行为断言表达；
# - step2 stageIn [product_locking, schedule_collecting, intent_discovery] 是 legacy
#   状态机词汇，行为化改写：锁品后应把流程向档期/体型推进（追问日期或身高）；
# - step3/step4 profile.rentalPeriod / heightCm / weightKg 断言豁免（blocked-on-§16，
#   见 README.md）；
# - step5 actionIn [guide_order, confirm_review] 无直接映射（§5.3 "其余逐场景定夺"）：
#   契约是"给下单指引、不甩线下渠道"，行为断言原样保留。
name: happy-path
description: 完整下单流程——打招呼 → 锁品 → 日期 → 体型 → 下单
customerId: golden-happy-path
productId: SUIT-001
conversationId: golden-happy-path-v1
steps:
  - user: 你好 在吗
    expect:
      contains: ['在']

  - user: 我想租这款黑色西装
    expect:
      containsAny: ['日期', '时间', '几号', '档期', '什么时候', '身高']

  - user: 4月29号到30号用

  - user: 身高180 体重70kg

  - user: 可以下单吗
    expect:
      contains: ['下单']
      notContains: ['电话', '到店']
      minScore: 6
