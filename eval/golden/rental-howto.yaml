# harness 版（§5.3）。与 legacy 版语义等价性：
# - action rental_howto → answer_question（§5.3 映射表）；
# - "提包邮必须带偏远地区例外"的过度承诺防线原样保留。
name: rental-howto
description: 用户问怎么租，应给出流程说明
customerId: golden-howto
productId: SUIT-001
conversationId: golden-howto-v1
steps:
  - user: 你们家衣服怎么租？
    expect:
      action: answer_question
      contains: ['租期']
      # 提"包邮"必须带偏远地区例外，否则是过度承诺（catalog: 新疆西藏等偏远除外）
      containsAny: ['偏远', '新疆', '西藏', '除外']
      minScore: 6
