# harness 版（§5.3）。与 legacy 版语义等价性：
# - actionIn [confirm_size, confirm_review, guide_order] → recommend_size /
#   check_availability / answer_question（confirm_size 走映射表，另两个逐场景定夺：
#   同为"三要素齐了就推进"的形态）；
# - 尺码正确性（175/70 → L）与"不追问围度/常穿码/套件拆分"的行为断言原样保留。
name: no-extra-questions
description: 三项齐全（身高体重+档期+款式）后，不得追问围度/常穿码/套件拆分
customerId: golden-no-extra
productId: SUIT-001
conversationId: golden-no-extra-v1
steps:
  - user: 我想租这款黑色双排扣西装
  - user: 5月9号到5月10号用
  - user: 身高175 体重70kg
    expect:
      actionIn: [recommend_size, check_availability, answer_question]
      containsAny: ["L"]
      contains: ["码"]
      notContains:
        - "胸围"
        - "腰围"
        - "肩宽"
        - "三围"
        - "软尺"
        - "常穿"
        - "几XL"
        - "整套还是"
        - "两件套"
      minScore: 7
