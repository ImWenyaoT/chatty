# 商品目录和尺码规则。改这里不需要改代码。
# priceQuote.source 会标记为 'manual'，表示来自本 catalog。

products:
  - id: SUIT-001
    name: 黑色双排扣西装
    dailyPrice: 199
    renewalDailyPrice: 99.5
    currency: CNY
    shippingPolicy: 寄出包邮，新疆、西藏等偏远地区除外
    pricingNote: 第一天全价，续租半价，在途不算租期

# 身高体重 → 推荐尺码规则。按顺序匹配，先命中先用。
sizeRules:
  - minHeight: 168
    maxHeight: 174
    minWeight: 55
    maxWeight: 65
    size: M
    confidence: medium
  - minHeight: 175
    maxHeight: 181
    minWeight: 66
    maxWeight: 80
    size: L
    confidence: high
  - minHeight: 182
    maxHeight: 188
    minWeight: 81
    maxWeight: 92
    size: XL
    confidence: medium

# 匹配不上时的兜底建议
sizeFallback:
  size: 尺码待人工确认
  confidence: low
