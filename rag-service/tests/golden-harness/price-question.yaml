# harness 版（§5.3）。与 legacy 版语义等价性：
# - action quote_price → answer_question（§5.3 映射表）；
# - "必须报出 199"的质量不变量由 contains 行为断言表达（harness lane 里价格
#   事实要靠 search_knowledge 检索命中，兼作检索链路的隐性闸门）。
name: price-question
description: 用户直接问价格，应给出价格 + 补充下一步
customerId: golden-price
productId: SUIT-001
conversationId: golden-price-v1
steps:
  - user: 这款多少钱一天？
    expect:
      action: answer_question
      contains: ["199"]
      notContains: ["不知道"]
      minScore: 6
