name: post-order-delivery
description: 已下单后问物流 → 不走 stage，直接回复寄达时间
customerId: golden-post-delivery
productId: SUIT-001
conversationId: golden-post-delivery-v1
steps:
  # 先把流程走到下单
  - user: 我想租这款黑色双排扣
  - user: 5月20号用
  - user: 身高175 体重70kg
  - user: 能下单吗
  # 下单通过 /orders/place 在真实 API 打标，这里通过 setup 让 orderPlacement 已存在很难，
  # 所以这个场景重点验证 post_order_followup 分支在 orderPlacement 存在时的行为需要另测。
  - user: 这个款好看吗
    expect:
      # 还没下单时此问题应该走兜底（follow_flow/answer_faq/small_talk）
      notContains: ["已下单"]
