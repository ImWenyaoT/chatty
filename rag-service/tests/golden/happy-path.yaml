name: happy-path
description: 完整下单流程——打招呼 → 锁品 → 日期 → 体型 → 下单
customerId: golden-happy-path
productId: SUIT-001
conversationId: golden-happy-path-v1
steps:
  - user: 你好 在吗
    expect:
      action: greet
      contains: ["在"]

  - user: 我想租这款黑色西装
    expect:
      stageIn: [product_locking, schedule_collecting, intent_discovery]

  - user: 4月29号到30号用
    expect:
      profile:
        rentalPeriod:
          startDate: "*"
          endDate: "*"

  - user: 身高180 体重70kg
    expect:
      profile:
        heightCm: 180
        weightKg: 70

  - user: 可以下单吗
    expect:
      actionIn: [guide_order, confirm_review]
      contains: ["下单"]
      notContains: ["电话", "到店"]
      minScore: 6
