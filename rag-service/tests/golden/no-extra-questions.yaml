name: no-extra-questions
description: 三项齐全（身高体重+档期+款式）后，不得追问围度/常穿码/套件拆分
customerId: golden-no-extra
productId: SUIT-001
conversationId: golden-no-extra-v1
steps:
  - user: 我想租这款黑色双排扣西装
  - user: 5月9号到5月10号用
