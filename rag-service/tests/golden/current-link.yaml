name: current-link
description: "用户问 \"当前链接就是这款吗\" 时应直接确认商品并引导下一步"
customerId: golden-current-link
productId: SUIT-001
conversationId: golden-current-link-v1
steps:
  - user: 就是当前链接这款吗
    expect:
      # 真实契约由 action==current_link_confirm 保证；店员不会说"当前链接"这种词，
      # 只要确认"就是这款"即可（OR 同义）。
      action: current_link_confirm
      containsAny: ["这款", "就是", "对"]
      notContains: ["胸围", "常穿"]
