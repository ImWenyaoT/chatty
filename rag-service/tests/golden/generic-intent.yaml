name: generic-intent
description: 用户说"我想租衣服"但没指定款式，应追问款式/编号
customerId: golden-generic
conversationId: golden-generic-v1
steps:
  - user: 我想租个衣服
    expect:
      # 追问款式/编号即可，不锁死字面"款式"+"编号"（"哪一款/商品号/链接"都算）。
      action: ask_product
      containsAny: ["款式", "编号", "哪一款", "哪款", "商品号", "链接"]
      notContains: ["身高"]
      minScore: 6
