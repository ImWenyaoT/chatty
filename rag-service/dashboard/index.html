<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>NEXUS · 智能客服评测中枢</title>
    <style>
      html, body { margin: 0; background: #05070f; color: #e6edf7; font-family: "Inter", "PingFang SC", sans-serif; }
      #boot {
        position: fixed; inset: 0; display: grid; place-items: center;
        background: radial-gradient(ellipse 70% 60% at 50% 40%, rgba(34,211,238,0.12), transparent 65%), #05070f;
        transition: opacity 0.35s ease;
      }
      #boot.gone { opacity: 0; pointer-events: none; }
      .boot-core {
        text-align: center;
      }
      .boot-ring {
        width: 54px; height: 54px;
        margin: 0 auto 18px;
        border-radius: 50%;
        border: 2px solid rgba(148, 163, 184, 0.18);
        border-top-color: #22d3ee;
        border-right-color: #818cf8;
        animation: spin 1s linear infinite;
        box-shadow: 0 0 24px rgba(34, 211, 238, 0.35);
      }
      @keyframes spin { to { transform: rotate(360deg); } }
      .boot-label {
        font-size: 11px;
        letter-spacing: 0.24em;
        text-transform: uppercase;
        color: #22d3ee;
        font-weight: 700;
      }
      .boot-sub {
        font-size: 11px;
        color: #5a6680;
        margin-top: 8px;
        font-family: ui-monospace, "JetBrains Mono", Menlo, monospace;
      }
    </style>
  </head>
  <body>
    <div id="boot">
      <div class="boot-core">
        <div class="boot-ring"></div>
        <div class="boot-label">NEXUS · Initializing</div>
        <div class="boot-sub">loading evaluation intelligence...</div>
      </div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      window.addEventListener('DOMContentLoaded', () => {
        const observer = new MutationObserver(() => {
          const root = document.getElementById('root');
          if (root && root.childElementCount > 0) {
            const boot = document.getElementById('boot');
            if (boot) {
              boot.classList.add('gone');
              setTimeout(() => boot.remove(), 400);
            }
            observer.disconnect();
          }
        });
        observer.observe(document.getElementById('root'), { childList: true, subtree: true });
      });
    </script>
  </body>
</html>
